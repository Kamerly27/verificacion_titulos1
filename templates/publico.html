<!DOCTYPE html>
<html>
<head>
    <title>Verificación Pública</title>
</head>
<body>

<h1>SISTEMA DE VERIFICACION DE TITULO UNIVERSITARIO</h1>

{% if estudiante %}
<p><b>Documento:</b> {{ estudiante[0] }}</p>
<p><b>Nombre:</b> {{ estudiante[3] }} {{ estudiante[1] }}</p>
<p><b>Título:</b> {{ estudiante[5] }}</p>
<p><b>Universidad:</b> {{ estudiante[6] }}</p>
<p style="color:green;"><b>ESTADO: VERIFICADO ✅</b></p>
{% endif %}

</body>
</html>
